<!DOCTYPE html>
<html>
<head>
<style>
div{
    border: 1px solid black;
    margin: 25px 50px 75px;
    background-color: lightblue;
}
</style>
</head>
<body>
    <h2>The margin shorthand property</h2>
    <div>This div element has a top margin of 25px, a right and left marign of 50px, and a bottom margin of 75px.</div>
</body>
</html>
