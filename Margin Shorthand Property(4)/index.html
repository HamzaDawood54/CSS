<!DOCTYPE html>
<html>
<head>
<style>
div{
    border: 1px solid black;
    margin: 25px;
    background-color: lightblue;
}
</style>
</head>
<body>
    <h2>The margin shorthand property</h2>
    <div>This div element has a top, right, bottom, and left margin of 25px.</div>
</body>
</html>
